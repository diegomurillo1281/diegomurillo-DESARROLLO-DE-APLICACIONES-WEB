<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Web Interactiva - Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">MiProyecto</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#inicio">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#productos">Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#contacto">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="inicio" class="container mt-4">
        <div id="carouselEx" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://via.placeholder.com/1200x400?text=Slide+1" class="d-block w-100" alt="...">
                </div>
                <div class="carousel-item">
                    <img src="https://via.placeholder.com/1200x400?text=Slide+2" class="d-block w-100" alt="...">
                </div>
            </div>
        </div>
    </section>

    <section id="productos" class="container mt-5">
        <h2 class="text-center mb-4">Nuestros Productos</h2>
        <table class="table table-hover table-striped shadow-sm">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Precio</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>01</td><td>Laptop Pro</td><td>$1200</td></tr>
                <tr><td>02</td><td>Mouse Gaming</td><td>$45</td></tr>
            </tbody>
        </table>
        <button class="btn btn-primary" onclick="mostrarAlerta()">¡Haz clic aquí!</button>
    </section>

    <section id="contacto" class="container mt-5 mb-5 p-4 bg-light rounded shadow">
        <h3>Contacto</h3>
        <form id="contactForm">
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" id="nombre" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mensaje</label>
                <textarea id="mensaje" class="form-control" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100">Enviar Mensaje</button>
            <div id="errorMsg" class="text-danger mt-2"></div>
        </form>
    </section>

    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2026 - Mi Proyecto de Programación | Síguenos en Redes</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
