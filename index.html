<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multimedia en la Web</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h2>Multimedia en la Web</h2>
  <p>Aquí demostraremos cómo insertar una imagen y un video. Presta <em>atención</em> a la estructura de las rutas.</p>

  <h3>Imagen</h3>
  <img src="assets/img/imagen1.jpg" alt="Descripción de una imagen relevante para el tema" width="600">

  <h3>Video</h3>
  <video controls width="600">
    <source src="assets/video/video1.mp4" type="video/mp4">
    Tu navegador no soporta el elemento de video.
  </video>

  <h3>Enlaces</h3>
  <p>Visita mi otro proyecto: <a href="https://ejemplo.com" target="_blank">Abrir ejemplo.com en una nueva pestaña</a></p>
</body>
</html>
