{% extends "base.html" %}

{% block content %}

<h2>Editar Producto</h2>

<form method="POST">

<label>Nombre</label>
<input type="text" name="nombre" value="{{ producto.nombre }}" required>

<br><br>

<label>Precio</label>
<input type="number" name="precio" value="{{ producto.precio }}" required>

<br><br>

<button type="submit">Actualizar</button>

</form>

{% endblock %}
