{% extends "base.html" %}

{% block content %}

<h2>Lista de Productos</h2>

<a href="{{ url_for('agregar_producto_mysql') }}">Agregar Producto</a>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Precio</th>
<th>Acciones</th>
</tr>

{% for producto in productos %}

<tr>
<td>{{ producto.id }}</td>
<td>{{ producto.nombre }}</td>
<td>{{ producto.precio }}</td>

<td>

<a href="{{ url_for('editar_producto', id=producto.id) }}">Editar</a>

<a href="{{ url_for('eliminar_producto', id=producto.id) }}">Eliminar</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
